name: pre-install-files

on:
  workflow_dispatch:
jobs:
  pre-install:
    runs-on: ubuntu-latest
    steps:
      - name: docker version
        run: |
         docker --version 

      - python version
        run: |
         python --version

      - node version
        run: |
         node -v

      - git version
        run: |
          git --version

