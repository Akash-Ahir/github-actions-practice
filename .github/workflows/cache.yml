name: Cache Demo

on:
  push:
  workflow_dispatch:

jobs:
  cache-python-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore pip cache
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Show cache result
        run: echo "Cache hit = ${{ steps.cache-pip.outputs.cache-hit }}"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest is installed
        run: pytest --version
