name: Job-output

on:
  push:

jobs:
  date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.date_step.outputs.today }}
    steps:
      - name: set date
        id: date_step
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
  
  print-date:
    runs-on: ubuntu-latest
    needs: date
    steps:
      - name: use date
        run: |
          echo "todays date: ${{ needs.date.outputs.today }}"
