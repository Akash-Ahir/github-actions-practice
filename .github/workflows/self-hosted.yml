name: Self-Hosted Runner

on: [push]

jobs:
  self-hosted:
    runs-on: [self-hosted, my-linux-runner]
    steps:
      - name: task to do
        run: |
          hostname
          pwd

          echo -e '#!/bin/bash\necho "Hello from runner!"' > hello.sh
          
          ls
          
          chmod +x hello.sh
          ./hello.sh
