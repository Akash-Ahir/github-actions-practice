name: Secrets 

on:
  push:
    branches:
      - main
      - master
      - '**'
  workflow_dispatch:

jobs:
  secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check whether secret exists
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: printing secret directly
        run: |
          echo "Secret value: ${{ secrets.MY_SECRET_MESSAGE }}"
