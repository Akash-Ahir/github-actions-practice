name: Upload Artifact Demo

on:
  push:
  workflow_dispatch:

jobs:
  upload-report:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          mkdir -p /home/ubuntu/github-actions-practice/output
          echo "Day 44 artifact demo" > /home/ubuntu/github-actions-practice/output/report.txt
          echo "Run ID: ${{ github.run_id }}" >> /home/ubuntu/github-actions-practice/output/report.txt
          echo "Commit: ${{ github.sha }}" >> /home/ubuntu/github-actions-practice/output/report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: day-44-report
          path: /home/ubuntu/github-actions-practice/output/report.txt
          if-no-files-found: error

  use-file:
    runs-on: ubuntu-latest
    needs: upload-report

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: report.txt
          path: /home/ubuntu/github-actions-practice/output

      - name: Print artifact content
        run: cat /home/ubuntu/github-actions-practice/output/report.txt
