name: Upload Artifact

on:
  push:
  workflow_dispatch:

jobs:
  upload-report:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          echo "this file is generated by workflow" > $GITHUB_WORKSPACE/output/report.txt
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_WORKSPACE/output/report.txt
          echo "Commit: ${{ github.sha }}" >> $GITHUB_WORKSPACE/output/report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: $GITHUB_WORKSPACE/output/report.txt

  use-file:
    runs-on: ubuntu-latest
    needs: upload-report

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: report
          path: $GITHUB_WORKSPACE/output

      - name: Print artifact content
        run: cat $GITHUB_WORKSPACE/output/report.txt
