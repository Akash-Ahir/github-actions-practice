name: Artifact

on:
  push:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          mkdir -p output
          echo "log file in workflow" > output/report.txt
          echo "Run ID: ${{ github.run_id }}" >> output/report.txt
          echo "Current date and time: $(date)" >> output/report.txt
          echo "Commit: ${{ github.sha }}" >> output/report.txt
          echo "Repository: $GITHUB_REPOSITORY" >> output/report.txt
          echo "Actor: $GITHUB_ACTOR" >> output/report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report.txt
          path: output/report.txt
          if-no-files-found: error
