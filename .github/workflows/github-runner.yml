name: 3-OS Hosted Runners

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ubuntu-runner-job:
    runs-on: ubuntu-latest
    steps:
      - name: Show Ubuntu OS info
        run: echo "OS: $(uname -s)"
      - name: Show hostname
        run: echo "Hostname: $(hostname)"
      - name: Show user
        run: echo "User: $(whoami)"

  windows-runner-job:
    runs-on: windows-latest
    steps:
      - name: Show Windows OS info
        run: echo "OS: Windows"
      - name: Show hostname
        run: hostname
      - name: Show user
        run: whoami

  macos-runner-job:
    runs-on: macos-latest
    steps:
      - name: Show macOS OS info
        run: echo "OS: $(uname -s)"
      - name: Show hostname
        run: hostname
      - name: Show user
        run: whoami
