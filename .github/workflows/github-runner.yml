name: 3-OS Hosted Runners

on:
  push:
  workflow_dispatch:

jobs:
  ubuntu-runner-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print OS
        run: echo "OS: $(uname -s)"
      - name: Print hostname
        run: echo "Hostname: $(hostname)"
      - name: Print user
        run: echo "User: $(whoami)"

  windows-runner-job:
    runs-on: windows-latest
    steps:
      - name: Print OS
        run: echo "OS: Windows"
      - name: Print hostname
        run: hostname
      - name: Print user
        run: whoami

  macos-runner-job:
    runs-on: macos-latest
    steps:
      - name: Print OS
        run: echo "OS: $(uname -s)"
      - name: Print hostname
        run: hostname
      - name: Print user
        run: whoami
